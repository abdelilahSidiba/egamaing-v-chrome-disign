name: egaming
description: تطبيق eGaming لإدارة بطولات eFootball بين الأصدقاء (يعمل بالكامل بدون إنترنت)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # قاعدة البيانات المحلية
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.4

  # إدارة الحالة
  provider: ^6.1.2

  # أدوات مساعدة
  uuid: ^4.4.0
  intl: ^0.19.0

  # الصور والشعارات
  image_picker: ^1.1.2

  # تصدير PDF ومشاركة (لتقرير البطولة)
  pdf: ^3.10.8
  printing: ^5.13.2
  share_plus: ^7.2.2

  # الإعدادات المحفوظة محليًا
  shared_preferences: ^2.2.3

  # اختيار ملفات من الجهاز (لاستعادة النسخ الاحتياطية)
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
